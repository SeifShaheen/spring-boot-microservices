syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.trendingmovieservice";

service TrendingService {
  rpc getTop10Movies (Empty) returns (MovieList);
}

message Empty {}

message Movie {
  string movieId = 1;
  string name = 2;
  double rating = 3;
}

message MovieList {
  repeated Movie movies = 1;
}